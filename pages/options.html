<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Reedy Pop Up</title>
	<script defer src="/src/options.ts" type="module"></script>
	<style>
		* {
			font-family: serif;
			background: whitesmoke
		}

		body {
			display: flex;
			align-items: center;
			flex-direction: column;
			width: 500px;
			margin: 10px;
		}

		h1 {
			margin-bottom: 5px;
		}

		button {
			font-size: large;
			border-style: solid;
			border-color: grey;
			border-radius: 5%;
			margin: 5px;
			width: 50%;
		}

		#help {
			display: flex;
			align-items: center;
			font-size: large;
		}
	</style>
</head>

<body>

	<h1>Reedy</h1>
	<button id="reedy-toggle">Reedy On/Off</button>

	<div id="help">
		<ul>
			<li> Press <b>alt-l</b> to turn the Reedy-screen on and off.</li>
			<li> <b>alt + up arrow</b> to move the highlighted range up.</li>
			<li> <b>alt + down arrow</b> to move the highlighted range down.</li>
			<li> You can also use <b>alt + j</b> and <b>alt + k</b>.</li>
		</ul>
	</div>

</body>

</html>
